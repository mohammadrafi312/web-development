<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="BLACK">
        <caption>FOOD MENU</caption>
        <thead>
        <TR>
            <th rowspan="2">ITEMS</th>
            <TH colspan="2">PRICE</TH>  
        </TR>
        <tr>
            <th>INR</th>
            <TH>USD</TH>
        </tr>
        </thead>
        <tbody>
        <TR>
            <TD>SAMOSA</TD>
            <TD>15</TD>
            <TD>0.55</TD>
            <TR>
            
            </TR>
            
            <TD>CAKE</TD>
            <TD>25</TD>
            <TD>0.67</TD>
            
        </TR>
        </tbody>
    </table>
</body>
</html>
